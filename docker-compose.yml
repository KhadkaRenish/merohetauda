services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: merohetauda_db
      POSTGRES_USER: merohetauda_user
      POSTGRES_PASSWORD: merohetauda_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U merohetauda_user -d merohetauda_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      POSTGRES_DB: merohetauda_db
      POSTGRES_USER: merohetauda_user
      POSTGRES_PASSWORD: merohetauda_password
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,0.0.0.0,backend,192.168.1.68"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./mero-hetauda
    environment:
      EXPO_PUBLIC_API_BASE_URL: http://localhost:8000/api
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - ./mero-hetauda:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
